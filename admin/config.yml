backend:
  name: github
  repo: hsen308/brew-and-butter
  branch: main
  base_url: https://brew-and-butter.vercel.app
  auth_endpoint: /api/auth

media_folder: "photos"
public_folder: "/photos"

collections:
  - name: "settings"
    label: "Site Settings"
    files:
      - name: "general"
        label: "General Info"
        file: "data/setting.json"
        fields:
          - { label: "Cafe Name", name: "name", widget: "string" }
          - { label: "Phone Number", name: "phone", widget: "string" }
          - { label: "Address", name: "address", widget: "string" }
          - { label: "Hero Image Path", name: "hero_image", widget: "string", required: false, default: "", hint: "Optional. Example: photos/croissant coffee and store front.JPG" }
      - name: "menu"
        label: "Menu Catalog"
        file: "data/menu.json"
        fields:
          - label: "Branches"
            name: "branches"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - { label: "Branch ID", name: "id", widget: "string", hint: "Use stable lowercase IDs like downtown or mousaytbe. Items use this ID." }
              - { label: "Branch Name", name: "name", widget: "string" }
              - { label: "Short Name", name: "short", widget: "string", required: false }
              - { label: "Area", name: "area", widget: "string" }
              - { label: "Exact Location", name: "exact_location", widget: "string" }
              - { label: "Address", name: "address", widget: "string" }
              - { label: "Neighborhood", name: "neighborhood", widget: "string", required: false }
              - { label: "Hours", name: "hours", widget: "string", default: "Mon - Sun, 8 AM - 11 PM" }
              - { label: "Features", name: "features", widget: "string", default: "Free Wi-Fi and study area" }
              - { label: "Payment", name: "payment", widget: "string", default: "Cash on delivery" }
              - { label: "Phone / WhatsApp", name: "phone", widget: "string" }
              - { label: "Google Maps Link", name: "map_url", widget: "string" }
              - { label: "Map Search Query", name: "map_query", widget: "string" }
              - { label: "Toters Link", name: "toters_url", widget: "string", required: false }
              - { label: "Visit Copy", name: "visit", widget: "text" }
          - label: "Categories"
            name: "categories"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - { label: "Category Name", name: "name", widget: "string" }
              - { label: "Family", name: "family", widget: "select", options: ["brew", "butter"], default: "butter", hint: "brew shows under drinks. butter shows under food." }
          - label: "Items"
            name: "items"
            widget: "list"
            summary: "{{fields.name}} - {{fields.category}}"
            fields:
              - { label: "Item Name", name: "name", widget: "string" }
              - { label: "Category", name: "category", widget: "string", hint: "Must match one of the category names above, like Coffee or Powerbowls." }
              - { label: "Branches", name: "branches", widget: "select", multiple: true, options: ["downtown", "mousaytbe"], hint: "Choose which branches sell this item." }
              - { label: "Price", name: "price", widget: "string" }
              - { label: "Description", name: "desc", widget: "string" }
              - { label: "Calories", name: "calories", widget: "number", required: false, value_type: "int" }
              - { label: "Protein (g)", name: "protein", widget: "number", required: false, value_type: "float" }
              - { label: "Tags", name: "tags", widget: "list", required: false, field: { label: "Tag", name: "tag", widget: "string" } }
              - label: "Options"
                name: "options"
                widget: "list"
                required: false
                summary: "{{fields.label}}"
                fields:
                  - { label: "Option Name", name: "name", widget: "string", hint: "Use a stable lowercase name like milk or bowlAdds." }
                  - { label: "Option Label", name: "label", widget: "string" }
                  - { label: "Type", name: "type", widget: "select", options: ["radio", "checkbox"], default: "checkbox" }
                  - label: "Choices"
                    name: "choices"
                    widget: "list"
                    summary: "{{fields.label}}"
                    fields:
                      - { label: "Choice Label", name: "label", widget: "string" }
                      - { label: "Extra Price", name: "price", widget: "string", default: "$0.00" }
                      - { label: "Calories Change", name: "calories_delta", widget: "number", required: false, value_type: "int", default: 0 }
                      - { label: "Protein Change (g)", name: "protein_delta", widget: "number", required: false, value_type: "float", default: 0 }
